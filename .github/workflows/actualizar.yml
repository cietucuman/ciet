name: Actualizar buscador (nube)

# Automatización de precios en la NUBE (gratis, repo público) — reemplaza a la laptop.
# Objetivo: 4 corridas/día a las 7/10/13/16 hora Argentina.
#
# DISEÑO ANTI-SALTEO: GitHub saltea cron programados sin aviso (el 18-19/7 salteó
# la mayoría, hasta 16 h sin correr). Por eso el cron es CADA HORA (minuto 7) y una
# COMPUERTA decide adentro: corre si es hora de corrida (7/10/13/16 ART) O si lo
# publicado tiene más de 3h15 (perro guardián). Así, CUALQUIER cron que sí dispare
# repara el atraso; los demás salen en segundos sin gastar nada.
# La yerba se captura en la primera corrida del día que la encuentre faltante.
on:
  schedule:
    - cron: '7 * * * *'
  workflow_dispatch:

# Cancela una corrida si otra empieza (evita que dos se pisen, como el candado local).
concurrency:
  group: actualizar
  cancel-in-progress: false

permissions:
  contents: write

jobs:
  actualizar:
    runs-on: ubuntu-latest
    timeout-minutes: 50   # la corrida normal tarda ~27-45 min (chequeo de páginas vivas incluido)
    env:
      TZ: America/Argentina/Tucuman   # el runner es UTC; sin esto fecha/hora salen 3 h adelantadas
    steps:
      - name: Compuerta (¿toca correr?)
        id: gate
        run: |
          set -e
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "disparo manual → corre"; exit 0
          fi
          HORA=$(date +%-H)
          ULTIMO=$(curl -s https://api.github.com/repos/${{ github.repository }}/branches/datos \
                   | python3 -c "import json,sys; print(json.load(sys.stdin)['commit']['commit']['committer']['date'])")
          EDAD=$(( $(date +%s) - $(date -d "$ULTIMO" +%s) ))
          echo "hora ART=$HORA · publicado hace $((EDAD/60)) min"
          if [ "$HORA" = "7" ] || [ "$HORA" = "10" ] || [ "$HORA" = "13" ] || [ "$HORA" = "16" ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "hora de corrida → corre"
          elif [ "$EDAD" -gt 11700 ]; then
            echo "run=true" >> "$GITHUB_OUTPUT"; echo "datos viejos (>3h15) → corre (perro guardián)"
          else
            echo "run=false" >> "$GITHUB_OUTPUT"; echo "nada que hacer → salgo"
          fi

      - uses: actions/checkout@v4
        if: steps.gate.outputs.run == 'true'
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        if: steps.gate.outputs.run == 'true'
        with:
          python-version: '3.11'

      - name: Config git
        if: steps.gate.outputs.run == 'true'
        run: |
          git config user.name "ciet-bot"
          git config user.email "actions@users.noreply.github.com"

      # --- Buscador -> rama datos (buscador.json en la raíz, que es lo que lee el sitio) ---
      - name: Scrapear y publicar buscador
        if: steps.gate.outputs.run == 'true'
        run: |
          set -e
          python3 scripts/fetch_buscador.py --tope 150 -o /tmp/buscador.json
          git fetch origin datos
          git worktree add -B datos /tmp/datos origin/datos
          cp /tmp/buscador.json /tmp/datos/buscador.json
          cd /tmp/datos
          git add buscador.json
          if git diff --cached --quiet HEAD; then
            echo "sin cambios en buscador.json"
          else
            git commit --amend -m "Buscador $(date +%F)"
            git push -f origin datos
            echo "buscador publicado"
          fi

      # Verificación post-scrape (25 productos al azar re-consultados en vivo). Informativa:
      # no aborta ni afecta el push; sólo deja el detalle en el log de la corrida.
      - name: Verificar buscador (informativo)
        if: steps.gate.outputs.run == 'true'
        continue-on-error: true
        run: python3 scripts/verificar_buscador.py --n 25 --buscador /tmp/datos/buscador.json

      # --- Canasta básica alimentaria -> rama canasta-datos (1×/día) ---
      # Valoriza la CBA del NOA (INDEC) con el buscador recién scrapeado y suma el
      # punto del día a la serie. Corre en la primera corrida del día que no
      # encuentre el punto de hoy. OJO: este paso vive acá desde el 18/7; si se
      # reescribe el workflow, hay que conservarlo (el 20-21/7 se perdió por eso).
      - name: Valorizar canasta básica (1×/día)
        if: always() && steps.gate.outputs.run == 'true'
        run: |
          set -e
          HOY=$(date +%F)
          git fetch origin canasta-datos
          git worktree add -B canasta-datos /tmp/canasta origin/canasta-datos
          if python3 -c "import json,sys; d=json.load(open('/tmp/canasta/serie.json')); sys.exit(0 if any(x['fecha']=='$HOY' for x in d['puntos']) else 1)"; then
            echo "la canasta de hoy ($HOY) ya está, no hago nada"
            exit 0
          fi
          python3 scripts/build_canasta.py --buscador /tmp/buscador.json -o /tmp/canasta
          cd /tmp/canasta
          git add -A
          git commit -m "Canasta: $HOY"
          git push origin canasta-datos
          echo "canasta publicada ($HOY)"

      # --- Índice de yerba -> rama yerba-datos (1×/día) ---
      - name: Capturar yerba (1×/día)
        if: always() && steps.gate.outputs.run == 'true'
        run: |
          set -e
          HOY=$(date +%F)
          git fetch origin yerba-datos
          git worktree add -B yerba-datos /tmp/yerba origin/yerba-datos
          if [ -f "/tmp/yerba/crudo/$HOY.json" ]; then
            echo "ya está la captura de yerba de hoy ($HOY), no hago nada"
            exit 0
          fi
          python3 scripts/fetch_buscador.py --terminos yerba --tope 200 -o "/tmp/yerba/crudo/$HOY.json"
          python3 scripts/build_indice_yerba.py --crudo /tmp/yerba/crudo -o /tmp/yerba/indice.json
          cd /tmp/yerba
          git add -A
          git commit -m "Yerba: captura $HOY"
          git push origin yerba-datos
          echo "yerba publicada ($HOY)"
