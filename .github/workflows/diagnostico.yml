name: Diagnostico conectividad
on:
  workflow_dispatch:
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Probar fuentes desde la IP de GitHub
        run: |
          echo "1) CKAN gobierno:"
          curl -s -o /dev/null -w "   HTTP %{http_code}\n" "https://datos.produccion.gob.ar/api/3/action/package_show?id=sepa-precios"
          echo "2) Descarga dump gobierno (HEAD):"
          curl -s -I -o /dev/null -w "   HTTP %{http_code}\n" "https://datos.produccion.gob.ar/dataset/6f47ec76-d1ce-4e34-a7e1-621fe9b1d0b5/resource/f8e75128-515a-436e-bf8d-5c63a62f2005/download/sepa_domingo.zip"
          echo "3) Precios Claros CloudFront (sucursales Tucuman):"
          curl -s -o /dev/null -w "   HTTP %{http_code}\n" "https://d3e6htiiul5ek9.cloudfront.net/prod/sucursales?lat=-26.82&lng=-65.22&limit=5"
          echo "4) Precios Claros: muestra de respuesta:"
          curl -s "https://d3e6htiiul5ek9.cloudfront.net/prod/sucursales?lat=-26.82&lng=-65.22&limit=2" | head -c 300
