name: Serie diaria IPS

# Corre solo todos los días y acumula la serie de precios antes de que
# SEPA sobrescriba los datos. También se puede disparar a mano desde
# la pestaña Actions → "Run workflow".
on:
  schedule:
    - cron: '0 12 * * *'   # 12:00 UTC ≈ 09:00 Argentina
  workflow_dispatch:

permissions:
  contents: write

jobs:
  actualizar-serie:
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - name: Traer el repo
        uses: actions/checkout@v4

      - name: Preparar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Actualizar serie y cobertura
        run: python3 scripts/build_series.py --dias 7

      - name: Commitear si hubo cambios
        run: |
          git config user.name "CIET bot"
          git config user.email "actions@users.noreply.github.com"
          git add data/serie.json data/cobertura.json
          if git diff --cached --quiet; then
            echo "Sin cambios en la serie."
          else
            git commit -m "Serie: actualización automática $(date -u +%Y-%m-%d)"
            git push
          fi
